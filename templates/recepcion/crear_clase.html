{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card p-4 bg-dark border-violet shadow-lg">
            <h3 class="text-center mb-4" style="color: var(--violet-main)">NUEVA CLASE</h3>
            <form method="post">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label text-white small text-uppercase">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                <div class="d-grid gap-2 mt-4">
                    <button type="submit" class="btn btn-violet fw-bold">GUARDAR CLASE</button>
                    <a href="{% url 'reporte_ganancias' %}" class="btn btn-outline-secondary">CANCELAR</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
