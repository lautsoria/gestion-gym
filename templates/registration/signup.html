{% extends 'base.html' %}

{% block title %}Registro - GymViolet{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4 shadow">
            <h2 class="text-center mb-4" style="color: var(--violet-main)">Crear Cuenta</h2>
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    {{ form.as_p }}
                </div>
                <button type="submit" class="btn btn-violet w-100">Registrarme</button>
            </form>
            <p class="mt-3 text-center text-secondary">
                ¿Ya eres socio? <a href="{% url 'login' %}" style="color: var(--violet-main)">Inicia sesión</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
