<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Ups! Página No Encontrada - Gym Violet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Estilos personalizados para seguir tu estética oscura/violeta */
        body {
            background-color: #1a1a1a; /* Fondo oscuro */
            color: #f8f9fa; /* Texto claro */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .vh-100 {
            height: 100vh;
        }
        .error-code {
            font-size: 10rem;
            font-weight: 800;
            color: #6f42c1; /* Violeta (Primary de Jazzmin) */
            line-height: 1;
            margin-bottom: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .error-message {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 2rem;
        }
        .btn-violet {
            background-color: #6f42c1;
            color: white;
            border: none;
            padding: 10px 30px;
            font-size: 1.1rem;
            border-radius: 30px;
            transition: all 0.3s ease;
        }
        .btn-violet:hover {
            background-color: #5a32a3;
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(111, 66, 193, 0.4);
        }
        /* Un pequeño detalle decorativo */
        .dumbbells-icon {
            font-size: 4rem;
            color: #444;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

    <div class="container vh-100 d-flex flex-column justify-content-center align-items-center text-center">
        <div class="dumbbells-icon">🏋️‍♂️💨</div>
        
        <h1 class="error-code">500</h1>
        <h2 class="mb-3">¡Ups! ¡Tuvimos un calambre en el servidor!.</h2>
        
        
        <a href="/" class="btn btn-violet btn-lg">
            Volver al Inicio
        </a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
